version: 1.0
variables:
  - prefix: [pkg, vpkg]
  - name: ["*"]
schema:
  "{{prefix}}":
    "{{name}}":
      description: general description
      template: root.md.template
      children:
        concepts:
          description: main concepts
          template: concepts.md.template
        cli:
          description: command-line usage guidance
          template: cli.md.template
        dev:
          description: development setup, tests, and debugging
          template: dev.md.template
        t:
          description: domain-specific topic namespace
          children:
            "{{name}}":
              description: domain-specific topic note
              template: topic.md.template
              dynamic_child: true
        ref:
          description: self-contained functionality references
          dynamic_child: true
        api:
          description: public module API namespace
          children:
            "{{name}}":
              description: public interfaces for a module
              dynamic_child: true
