version: 1.0
output:
  file_extension: md
variables:
  project_title:
    values: ["*"]
    default: Project
    description: Human-readable project title.
  spec_num:
    values: ["*"]
    default: "01"
    description: Active spec number.
  spec_name:
    values: ["*"]
    default: bootstrap
    description: Active spec slug.
  archived_spec_num:
    values: ["*"]
    default: "00"
    description: Archived spec number.
  archived_spec_name:
    values: ["*"]
    default: archived
    description: Archived spec slug.
schema:
  design:
    description: Durable project design and decision record.
    template: design
  memory:
    description: Concise durable context shared across project work.
    template: memory
  progress:
    description: Project-level status, completed work, and next steps.
    template: progress
  docs:
    description: Active and archived project specifications.
    children:
      "spec-{{spec_num}}-{{spec_name}}":
        description: Active numbered implementation or investigation specification.
        template: spec
        dynamic_child: true
      .archive:
        description: Completed or superseded specifications.
        children:
          "spec-{{archived_spec_num}}-{{archived_spec_name}}":
            description: Archived numbered specification.
            template: archived-spec
            dynamic_child: true
  .agents:
    description: Agent runtime handoff and progress notes.
    children:
      runs:
        description: Per-spec runtime notes.
        children:
          "spec-{{spec_num}}":
            description: Runtime notes for an active numbered spec.
            dynamic_child: true
            children:
              handoff:
                description: Current resumption context and next action.
                template: handoff
              progress:
                description: Spec-local implementation progress.
                template: run-progress
              learnings:
                description: Durable takeaways discovered while executing the spec.
                template: learnings
