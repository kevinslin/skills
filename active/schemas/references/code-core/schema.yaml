version: 1.0
output:
  path_style: directory
  file_extension: md
schema:
  readme:
    description: general overview of code
  assets:
    description: non-markdown files
    dynamic_child: true
  concepts:
    description: index of various concepts
  dev:
    description: how to setup for development
    template: dev
    children:
      qa:
        description: testing
        template: qa
      obs:
        description: observability
        template: obs
  flow:
    description: execution-flow documentation
    children:
      "{{flow}}":
        description: flow doc for a specific execution path
        template: flow-doc
        dynamic_child: true
  arch:
    description: architecture documentation for a named system, subsystem, workflow, or service boundary
    children:
      "{{arch}}":
        description: architecture doc for a specific system, subsystem, workflow, or service boundary
        template: architecture
        dynamic_child: true
  pr:
    description: PR code-change flow docs. Use `pr/{{num}}-{{slug}}.md`, where `num` is the pull request number and `slug` is the lowercase hyphenated PR title; the document should describe the execution or behavior flow changed by the PR, not the pull request lifecycle.
    children:
      "{{num}}-{{slug}}":
        description: flow doc for the code changes in a specific pull request
        template: flow-doc
        dynamic_child: true
  api:
    description: api reference
    children:
      "{{api_name}}":
        description: api reference
        template: api
        dynamic_child: true
