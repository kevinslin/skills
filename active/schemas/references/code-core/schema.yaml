version: 1.0
output:
  path_style: directory
  file_extension: md
schema:
  readme:
    description: general overview of code
  concepts:
    description: index of various concepts
  dev:
    description: how to setup for development
    template: dev
    children:
      qa:
        description: testing
        template: qa
      obs:
        description: observability
        template: obs
  flow:
    description: execution-flow documentation
    materialize: false
    children:
      "{{flow}}":
        description: flow doc for a specific execution path
        template: flow-doc
        dynamic_child: true
  api:
    description: api reference
    materialize: false
    children:
      "{{api_name}}":
        description: api reference
        template: api
        dynamic_child: true
