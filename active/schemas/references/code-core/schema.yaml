version: 1.0
output:
  path_style: directory
  file_extension: md
variables:
  api_name:
    values: ["*"]
    default: api
    description: API reference page slug.
  flow:
    values: ["*"]
    default: flow
    description: Execution-flow doc slug.
schema:
  dev:
    description: how to setup for development
    template: dev
    children:
      qa:
        description: testing
        template: qa
      obs:
        description: observability
        template: obs
  flow:
    description: execution-flow documentation
    materialize: false
    required: false
    children:
      "{{flow}}":
        description: flow doc for a specific execution path
        template: flow-doc
        required: false
        dynamic_child: true
  api:
    description: api reference
    materialize: false
    children:
      "{{api_name}}":
        description: api reference
        template: api
