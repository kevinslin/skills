version: 1.0
output:
  path_style: directory
  file_extension: md
variables:
  project_title:
    values: ["*"]
    default: Project
    description: Human-readable project title used in generated headings.
  spec_num:
    values: ["*"]
    default: "01"
    description: Initial active spec number.
  spec_name:
    values: ["*"]
    default: bootstrap
    description: Initial active spec slug.
  archived_spec_num:
    values: ["*"]
    description: Archived spec number for optional docs/.archive materialization.
  archived_spec_name:
    values: ["*"]
    description: Archived spec slug for optional docs/.archive materialization.
schema:
  AGENTS:
    description: Project-local instructions for agents working in this directory.
    template: agents
  design:
    description: Project-level design document.
    template: design
  memory:
    description: Durable project facts, decisions, and constraints.
    template: memory
  config:
    description: Non-secret config schema, defaults, and environment variables.
    template: config
  progress:
    description: Global status board with milestones, blockers, and next actions.
    insertion_policy:
      use_when:
        - The update changes project-wide status, milestones, blockers, or next actions across specs.
      avoid_when:
        - The update is only a per-spec execution log or run-local status note.
    template: progress
  docs:
    description: Active feature specs grouped by spec number.
    materialize: false
    children:
      "spec-{{spec_num}}-{{spec_name}}":
        description: Initial active feature spec.
        template: spec
      ".archive":
        description: Archived specs kept for reference after landing.
        materialize: false
        children:
          "spec-{{archived_spec_num}}-{{archived_spec_name}}":
            description: Archived feature spec.
            template: spec-archive
  ".agents":
    description: Runtime and local-only artifacts for this project.
    materialize: false
    children:
      runs:
        description: Per-spec working notes and execution artifacts.
        materialize: false
        children:
          "spec-{{spec_num}}":
            description: Per-spec run directory.
            materialize: false
            children:
              progress:
                description: Per-spec progress log.
                insertion_policy:
                  use_when:
                    - The update records current state, next steps, or blockers for this specific spec run.
                  avoid_when:
                    - The update belongs on the project-wide status board or changes cross-spec status.
                template: run-progress
              learnings:
                description: Per-spec learnings and retrospective notes.
                insertion_policy:
                  use_when:
                    - The update captures reusable lessons, retrospective observations, or follow-up improvements from this spec.
                  avoid_when:
                    - The update is just current status or resume instructions for the next session.
                template: run-learnings
              handoff:
                description: Handoff note for the next agent/session.
                insertion_policy:
                  use_when:
                    - The update gives the next agent immediate resume context, open steps, or local run state.
                  avoid_when:
                    - The update is a durable lesson, retrospective note, or project-wide memory.
                template: run-handoff
