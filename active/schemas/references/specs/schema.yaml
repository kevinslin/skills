version: 1.0
output:
  file_extension: md
variables:
  spec_number:
    values: ["*"]
    default: "1"
    description: Spec number, incrementing from 1.
  spec_slug:
    values: ["*"]
    default: bootstrap
    description: Kebab-case spec slug.
  artifact:
    values: ["*"]
    description: Kebab-case artifact slug.
  flow:
    values: ["*"]
    description: Concise kebab-case flow name.
  cook:
    values: ["*"]
    description: Kebab-case cookbook slug.
  subspec:
    values: ["*"]
    default: "1.1"
    description: Milestone subspec number, using 1.N numbering.
  subspec_slug:
    values: ["*"]
    description: Kebab-case milestone slug.
  report:
    values: ["*"]
    description: Kebab-case report slug.
  proof:
    values: ["*"]
    default: proof
    description: Integration proof slug.
  scenario:
    values: ["*"]
    description: Integration proof scenario slug.
schema:
  specs:
    description: Active numbered specs plus a root archive for completed or superseded spec units.
    children:
      ".archive":
        description: Completed or superseded spec units, including terminal milestone subspecs, moved here without renaming.
        dynamic_child: true
      "{{spec_number}}-{{spec_slug}}":
        description: One active numbered spec directory.
        dynamic_child: true
        children:
          artifacts:
            description: Durable supporting artifacts attached to this spec, including operator runbooks, handoff instructions, and other concrete deliverables.
            children:
              "{{artifact}}":
                description: One durable supporting artifact for this spec.
                template: artifact
                dynamic_child: true
                insertion_policy:
                  use_when:
                    - The file is a concrete deliverable, operator runbook, command sequence, or handoff artifact referenced by the spec.
                    - The content should remain independently usable without expanding the main spec.
                  avoid_when:
                    - The document is the main feature spec, a milestone plan, or a behavior flow explanation.
                    - The content is raw integration evidence; put that under proofs instead.
          flows:
            description: Flow docs for this spec. Use concise kebab-case flow names, following the specy flow-doc naming contract.
            children:
              "{{flow}}":
                description: Flow doc for a specific spec behavior or execution path.
                template: flow-doc
                dynamic_child: true
                insertion_policy:
                  use_when:
                    - The document explains how a startup, request, job, command, UI action, feature, or behavior flow works.
                    - The flow name is concise kebab-case and names the feature or behavior rather than the implementation class.
                  avoid_when:
                    - The document is the main feature spec or milestone plan.
                    - The content is a raw integration artifact or proof summary.
          cook:
            description: Cookbooks and reusable recipes for this spec.
            children:
              "{{cook}}":
                description: Cookbook or reusable recipe for a recurring spec task.
                template: cook
                dynamic_child: true
                insertion_policy:
                  use_when:
                    - The document captures a repeatable recipe or workflow that can be reused across runs.
                    - The content includes inputs, commands, decision points, and expected outputs for a recurring task.
                  avoid_when:
                    - The document is a one-off report, raw proof artifact, or main feature spec.
          milestones:
            description: Optional milestone subspecs, numbered as 1.N where N increments from 1.
            children:
              "{{subspec}}-{{subspec_slug}}":
                description: Milestone subspec document.
                template: milestone
                dynamic_child: true
          proofs:
            description: Integration behavior proofs for this spec.
            children_from:
              - schema: integ-proof
                vars:
                  proof: "{{proof}}"
                  scenario: "{{scenario}}"
          reports:
            description: Optional custom reports relevant to this spec.
            children:
              "{{report}}":
                description: Custom report relevant to this spec.
                template: report
                dynamic_child: true
